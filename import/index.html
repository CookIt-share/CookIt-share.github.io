<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookIt - Partage de recette</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
        }
        p {
            font-size: 1.2em;
            opacity: 0.9;
            line-height: 1.6;
        }
        .app-icon {
            font-size: 5em;
            margin-bottom: 0.3em;
        }
        .loading {
            margin-top: 2em;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">🍳</div>
        <h1>CookIt</h1>
        <p id="message">Ouverture de la recette dans l'application...</p>
        <div class="loading">
            <div class="spinner"></div>
        </div>
        <p style="font-size: 0.9em; margin-top: 2em; opacity: 0.7;">
            Si l'application ne s'ouvre pas automatiquement, assurez-vous qu'elle est installée sur votre appareil.
        </p>
    </div>

    <script>
        // Récupération automatique du paramètre recipe
        const params = new URLSearchParams(window.location.search);
        const recipe = params.get('recipe');
        
        if (recipe) {
            // L'URL complète sera gérée par Android App Links
            // Android ouvrira automatiquement l'app grâce au manifest
            document.getElementById('message').textContent = 
                'Redirection vers CookIt...';
            
            // Fallback : si l'app ne s'ouvre pas après 3 secondes
            setTimeout(() => {
                document.getElementById('message').textContent = 
                    'Veuillez ouvrir l\'application CookIt manuellement pour importer cette recette.';
            }, 3000);
        } else {
            document.getElementById('message').textContent = 
                'Aucune recette à importer. Lien invalide.';
        }
    </script>
</body>
</html>
